<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세계도시 여권 — 위치와 영향력 퀴즈</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  *{box-sizing:border-box; margin:0; padding:0;}

  html,body{
    min-height:100%;
    background:
      radial-gradient(ellipse at 20% -10%, #1c2f4a 0%, transparent 55%),
      radial-gradient(ellipse at 100% 110%, #1a2942 0%, transparent 50%),
      #0F1B2D;
    color:#F2EAD3;
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  body{
    display:flex;
    justify-content:center;
    padding:32px 16px 80px;
  }

  .layout{
    display:flex;
    align-items:flex-start;
    gap:26px;
    width:100%;
    max-width:1120px;
  }

  .map-panel{
    flex:0 0 44%;
    position:sticky;
    top:28px;
  }
  .map-caption{
    font-size:14px;
    font-weight:600;
    color:#EDE6D3;
    margin-bottom:10px;
    line-height:1.5;
    min-height:42px;
  }
  .worldmap{
    position:relative;
    width:100%;
    aspect-ratio:2/1;
    border-radius:14px;
    border:1px solid rgba(201,162,39,0.3);
    overflow:hidden;
    background:linear-gradient(180deg,#0d1c30,#0a1524);
  }
  .worldmap svg{
    width:100%;
    height:100%;
    display:block;
  }
  .worldmap path.land{
    fill:#233c5e;
    stroke:#3b5678;
    stroke-width:0.6;
  }

  .app{
    flex:1;
    min-width:0;
    max-width:640px;
  }

  @media (max-width:860px){
    .layout{flex-direction:column;}
    .map-panel{position:static; width:100%; flex:none;}
    .app{max-width:100%;}
  }

  /* ---------- Header / Passport strip ---------- */
  .masthead{
    text-align:center;
    margin-bottom:22px;
  }
  .eyebrow{
    font-family:'Space Mono',monospace;
    font-size:11px;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:#C9A227;
  }
  .title{
    font-family:'Playfair Display',serif;
    font-weight:800;
    font-size:clamp(26px,5vw,34px);
    margin-top:6px;
    color:#F7F1DE;
  }
  .subtitle{
    font-size:13px;
    color:#9FB0C6;
    margin-top:6px;
    line-height:1.5;
  }

  .passport{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:8px;
    margin:22px 0 8px;
    padding:14px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(201,162,39,0.25);
    border-radius:10px;
  }
  .stamp-slot{
    aspect-ratio:1;
    border-radius:50%;
    border:1.5px dashed rgba(159,176,198,0.35);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Space Mono',monospace;
    font-size:10px;
    color:#5b6d85;
    position:relative;
    overflow:hidden;
  }
  .stamp-slot.filled{
    border:2px solid #C9A227;
    color:#0F1B2D;
    background:
      repeating-radial-gradient(circle at 50% 50%, #E9C75B 0px, #E9C75B 2px, #D4AF37 2px, #D4AF37 4px);
    font-weight:700;
    transform:rotate(-6deg);
    animation:stampIn 0.35s ease;
  }
  .stamp-slot.wrong{
    border:2px solid #D1495B;
    color:#D1495B;
    background:rgba(209,73,91,0.08);
  }
  @keyframes stampIn{
    0%{transform:scale(1.6) rotate(-6deg); opacity:0;}
    60%{transform:scale(0.92) rotate(-6deg); opacity:1;}
    100%{transform:scale(1) rotate(-6deg); opacity:1;}
  }

  .score-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family:'Space Mono',monospace;
    font-size:12px;
    color:#9FB0C6;
    margin-bottom:22px;
    padding:0 2px;
  }
  .score-row b{color:#F2EAD3; font-size:14px;}

  /* ---------- Card ---------- */
  .card{
    background:#16243B;
    border:1px solid rgba(255,255,255,0.06);
    border-radius:16px;
    padding:26px 24px 24px;
    box-shadow:0 20px 40px -20px rgba(0,0,0,0.6);
  }

  .stop-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:16px;
  }
  .stop-label{
    font-family:'Space Mono',monospace;
    font-size:11px;
    color:#6b7d97;
    letter-spacing:0.05em;
  }
  .continent-pill{
    font-family:'Space Mono',monospace;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:5px 12px;
    border:1px solid #C9A227;
    color:#E9C75B;
    border-radius:999px;
  }

  .clue-list{
    list-style:none;
    margin:10px 0 18px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .clue-list li{
    font-size:15.5px;
    line-height:1.55;
    color:#EDE6D3;
    padding-left:22px;
    position:relative;
    opacity:0;
    animation:fadeUp 0.4s ease forwards;
  }
  .clue-list li::before{
    content:attr(data-n);
    position:absolute;
    left:0;
    top:1px;
    font-family:'Space Mono',monospace;
    font-size:11px;
    color:#C9A227;
    border:1px solid #C9A227;
    width:16px; height:16px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
  }
  @keyframes fadeUp{
    from{opacity:0; transform:translateY(6px);}
    to{opacity:1; transform:translateY(0);}
  }

  .hint-btn{
    background:transparent;
    border:1px dashed #4a5c78;
    color:#9FB0C6;
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:600;
    padding:9px 16px;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:20px;
    transition:all 0.15s ease;
  }
  .hint-btn:hover{border-color:#C9A227; color:#E9C75B;}
  .hint-btn:disabled{opacity:0.3; cursor:not-allowed;}
  .hint-cost{
    font-family:'Space Mono',monospace;
    font-size:10px;
    color:#6b7d97;
    margin-left:6px;
  }

  .options{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:6px;
  }
  @media (max-width:420px){
    .options{grid-template-columns:1fr;}
  }
  .opt-btn{
    background:#1c2c46;
    border:1px solid rgba(255,255,255,0.08);
    color:#F2EAD3;
    font-family:'Inter',sans-serif;
    font-size:15px;
    font-weight:600;
    padding:14px 12px;
    border-radius:10px;
    cursor:pointer;
    text-align:center;
    transition:all 0.12s ease;
  }
  .opt-btn:hover{background:#243352; border-color:#3a4d6e;}
  .opt-btn:disabled{cursor:default;}
  .opt-btn.correct{
    background:rgba(79,176,165,0.18);
    border-color:#4FB0A5;
    color:#8FE3D6;
  }
  .opt-btn.incorrect{
    background:rgba(209,73,91,0.15);
    border-color:#D1495B;
    color:#F0A5AF;
  }
  .opt-btn.dim{opacity:0.4;}

  .feedback{
    margin-top:16px;
    padding:14px 16px;
    border-radius:10px;
    font-size:14px;
    line-height:1.6;
    display:none;
  }
  .feedback.show{display:block; animation:fadeUp 0.3s ease;}
  .feedback.good{background:rgba(79,176,165,0.1); border:1px solid rgba(79,176,165,0.35);}
  .feedback.bad{background:rgba(209,73,91,0.1); border:1px solid rgba(209,73,91,0.35);}
  .feedback .pts{
    font-family:'Space Mono',monospace;
    color:#E9C75B;
    font-weight:700;
  }
  .feedback .why{
    margin-top:8px;
    color:#B9C4D6;
  }

  /* ---------- Pin markers over real map ---------- */
  .pin{
    position:absolute;
    width:16px; height:16px;
    transform:translate(-50%,-50%);
    border-radius:50%;
    border:1.5px dashed rgba(233,199,91,0.85);
    background:rgba(22,36,59,0.92);
    cursor:pointer;
    padding:0;
    z-index:2;
    transition:all 0.15s ease;
  }
  .pin:hover{border-color:#E9C75B; transform:translate(-50%,-50%) scale(1.2);}
  .pin.revealed{
    border:2px solid #4FB0A5;
    background:#4FB0A5;
  }
  .pin.wrong-flash{
    border:2px solid #D1495B;
    background:#D1495B;
  }
  .pin-label{
    position:absolute;
    top:130%;
    left:50%;
    transform:translateX(-50%);
    font-family:'Space Mono',monospace;
    font-size:9px;
    white-space:nowrap;
    color:#E9C75B;
    background:rgba(15,27,45,0.9);
    padding:2px 6px;
    border-radius:4px;
    display:none;
    pointer-events:none;
  }
  .pin.revealed .pin-label{display:block;}
  .worldmap.locked .pin{pointer-events:none;}

  .loc-feedback{
    margin-top:14px;
    padding:12px 14px;
    border-radius:10px;
    font-size:13.5px;
    line-height:1.55;
    display:none;
  }
  .loc-feedback.show{display:block; animation:fadeUp 0.3s ease;}
  .loc-feedback.good{background:rgba(79,176,165,0.1); border:1px solid rgba(79,176,165,0.35);}
  .loc-feedback.bad{background:rgba(209,73,91,0.1); border:1px solid rgba(209,73,91,0.35);}

  .next-btn{
    width:100%;
    margin-top:16px;
    background:#C9A227;
    color:#16243B;
    border:none;
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size:15px;
    padding:14px;
    border-radius:10px;
    cursor:pointer;
    display:none;
  }
  .next-btn.show{display:block;}
  .next-btn:hover{background:#DBB53A;}

  /* ---------- Result screen ---------- */
  .result{display:none;}
  .result.show{display:block;}
  .result-score{
    text-align:center;
    padding:20px 0 10px;
  }
  .result-score .num{
    font-family:'Playfair Display',serif;
    font-weight:800;
    font-size:52px;
    color:#E9C75B;
  }
  .result-score .of{
    font-family:'Space Mono',monospace;
    font-size:13px;
    color:#9FB0C6;
  }
  .reflect-box{
    margin-top:22px;
  }
  .reflect-box label{
    display:block;
    font-size:14px;
    color:#EDE6D3;
    margin-bottom:8px;
    line-height:1.5;
    font-weight:600;
  }
  .reflect-box textarea{
    width:100%;
    min-height:90px;
    background:#101d31;
    border:1px solid rgba(255,255,255,0.1);
    border-radius:10px;
    color:#F2EAD3;
    font-family:'Inter',sans-serif;
    font-size:14px;
    padding:12px;
    resize:vertical;
  }
  .reflect-box textarea:focus{outline:2px solid #C9A227; outline-offset:1px;}

  .continent-summary{
    margin-top:22px;
    border-top:1px solid rgba(255,255,255,0.08);
    padding-top:16px;
  }
  .continent-summary h4{
    font-family:'Space Mono',monospace;
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:#9FB0C6;
    margin-bottom:10px;
  }
  .csum-row{
    display:flex;
    justify-content:space-between;
    font-size:13.5px;
    padding:6px 0;
    border-bottom:1px dashed rgba(255,255,255,0.06);
    color:#DCE3EE;
  }
  .csum-row b{color:#E9C75B;}

  .restart-btn{
    margin-top:22px;
    width:100%;
    background:transparent;
    border:1px solid #4a5c78;
    color:#9FB0C6;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
  }
  .restart-btn:hover{border-color:#C9A227; color:#E9C75B;}

  :focus-visible{outline:2px solid #C9A227; outline-offset:2px;}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }
</style>
</head>

    name:"두바이", continent:"아시아(서)", code:"AS",
    clues:[
      "사막 위에 세워진 초고층 빌딩 도시다",
      "중동 최대 항공·물류 허브다",
      "부르즈 할리파가 있다"
    ],
    options:["두바이","리야드","도하","아부다비"],
    answer:0,
    why:"자연 조건의 불리함을 교통·물류 인프라로 극복한 도시 개발 사례예요.",
    lat:25.2, lng:55.3, coord:"북위 25.2°, 동경 55.3°"
  },
  {
    name:"카이로", continent:"아프리카", code:"AF",
    clues:[
      "아프리카 대륙에서 인구가 가장 많은 도시권 중 하나다",
      "사막기후 지역이지만 큰 강을 끼고 발달했다",
      "피라미드와 나일강이 있다"
    ],
    options:["카이로","라고스","나이로비","요하네스버그"],
    answer:0,
    why:"기후가 불리해도 큰 강을 끼면 거대도시로 성장할 수 있다는 걸 보여줘요.",
    lat:30.0, lng:31.2, coord:"북위 30°, 동경 31.2°"
  },
  {
    name:"모스크바", continent:"유럽(러시아)", code:"EU",
    clues:[
      "유럽에서 인구가 가장 많은 도시 중 하나다",
      "유럽과 아시아에 걸친 나라의 수도다",
      "붉은광장과 크렘린이 있다"
    ],
    options:["모스크바","상트페테르부르크","이스탄불","키이우"],
    answer:0,
    why:"수도라는 위치는 정치적 결정이 모이는 곳이라는 영향력을 뜻해요.",
    lat:55.8, lng:37.6, coord:"북위 55.8°, 동경 37.6°"
  },
  {
    name:"상파울루", continent:"남아메리카", code:"SA",
    clues:[
      "남반구·남아메리카 최대의 경제 중심지다",
      "브라질 최대 도시지만 수도는 아니다",
      "남아메리카에서 인구가 가장 많은 도시권이다"
    ],
    options:["상파울루","리우데자네이루","부에노스아이레스","보고타"],
    answer:0,
    why:"인구 규모 자체도 하나의 영향력이에요 — 소비 시장과 노동력의 중심이 되니까요.",
    lat:-23.5, lng:-46.6, coord:"남위 23.5°, 서경 46.6°"
  },
  {
    name:"시드니", continent:"오세아니아", code:"OC",
    clues:[
      "남반구에 있어 우리나라와 계절이 반대다",
      "영국 연방 국가 중 대양주 최대 도시다",
      "오페라하우스가 있다"
    ],
    options:["시드니","멜버른","오클랜드","브리즈번"],
    answer:0,
    why:"위도(남반구·북반구)를 알면 그 도시의 계절과 기후까지 함께 추론할 수 있어요.",
    lat:-33.9, lng:151.2, coord:"남위 33.9°, 동경 151.2°"
  }
];

let idx = 0;
let hintsUsed = 0;
let score = 0;
let answered = false;
let results = []; // {correct: bool, code, name}

const passportEl = document.getElementById('passport');
const progressText = document.getElementById('progressText');
const scoreText = document.getElementById('scoreText');
const stopLabel = document.getElementById('stopLabel');
const continentPill = document.getElementById('continentPill');
const clueList = document.getElementById('clueList');
const hintBtn = document.getElementById('hintBtn');
const hintCost = document.getElementById('hintCost');
const optionsEl = document.getElementById('options');
const feedbackEl = document.getElementById('feedback');
const nextBtn = document.getElementById('nextBtn');
const quizCard = document.getElementById('quizCard');
const resultCard = document.getElementById('resultCard');
const mapCaption = document.getElementById('mapCaption');
const locFeedback = document.getElementById('locFeedback');

let locAnswered = false;
let cityPins = [];
const worldmapEl = document.getElementById('worldmap');

function initPassport(){
  passportEl.innerHTML = '';
  cities.forEach((c,i)=>{
    const d = document.createElement('div');
    d.className = 'stamp-slot';
    d.id = 'slot-'+i;
    d.textContent = c.code;
    passportEl.appendChild(d);
  });
}

function initMap(){
  cities.forEach((c,i)=>{
    const leftPct = (c.lng + 180) / 360 * 100;
    const topPct = (90 - c.lat) / 180 * 100;

    const pin = document.createElement('button');
    pin.className = 'pin';
    pin.id = 'pin-'+i;
    pin.style.left = leftPct + '%';
    pin.style.top = topPct + '%';
    pin.setAttribute('aria-label', '지도 위치 '+(i+1));

    const label = document.createElement('span');
    label.className = 'pin-label';
    label.textContent = c.name;
    pin.appendChild(label);

    pin.addEventListener('click', ()=>onPinClick(i));
    worldmapEl.appendChild(pin);
    cityPins.push(pin);
  });
}

function lockMap(){
  worldmapEl.classList.add('locked');
}
function unlockMap(){
  worldmapEl.classList.remove('locked');
}

function pointsForHints(h){
  return h===0 ? 10 : (h===1 ? 7 : 4);
}

function renderQuestion(){
  answered = false;
  hintsUsed = 0;
  const c = cities[idx];

  stopLabel.textContent = `STOP ${String(idx+1).padStart(2,'0')} / ${cities.length}`;
  continentPill.textContent = c.continent;
  progressText.textContent = `${idx+1} / ${cities.length}`;
  scoreText.textContent = score;

  clueList.innerHTML = '';
  addClueLine(0);

  hintBtn.disabled = false;
  hintBtn.style.display = 'inline-block';
  updateHintCost();

  optionsEl.innerHTML = '';
  const order = c.options.map((opt,i)=>({opt,i}));
  order.forEach(o=>{
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = o.opt;
    btn.addEventListener('click', ()=>selectAnswer(o.i, btn));
    optionsEl.appendChild(btn);
  });

  feedbackEl.className = 'feedback';
  feedbackEl.innerHTML = '';
  nextBtn.className = 'next-btn';

  locFeedback.className = 'loc-feedback';
  locFeedback.innerHTML = '';
  locAnswered = false;
  lockMap();
  mapCaption.textContent = '먼저 이름을 맞히면, 이 지도에서 위치를 확인할 수 있어요.';
}

function addClueLine(n){
  const c = cities[idx];
  const li = document.createElement('li');
  li.setAttribute('data-n', n+1);
  li.textContent = c.clues[n];
  li.style.animationDelay = '0.05s';
  clueList.appendChild(li);
}

function updateHintCost(){
  const c = cities[idx];
  if(hintsUsed >= c.clues.length - 1){
    hintBtn.disabled = true;
    hintCost.textContent = '(더 이상 힌트 없음)';
    return;
  }
  const nextPts = pointsForHints(hintsUsed+1);
  hintCost.textContent = `(누르면 이 문제 최대 점수가 ${nextPts}점으로 낮아져요)`;
}

hintBtn.addEventListener('click', ()=>{
  if(answered) return;
  const c = cities[idx];
  if(hintsUsed < c.clues.length - 1){
    hintsUsed++;
    addClueLine(hintsUsed);
    updateHintCost();
  }
});

function selectAnswer(choiceIdx, btnEl){
  if(answered) return;
  answered = true;
  const c = cities[idx];
  hintBtn.disabled = true;

  const allBtns = optionsEl.querySelectorAll('.opt-btn');
  allBtns.forEach(b=>b.disabled = true);

  const isCorrect = choiceIdx === c.answer;
  const pts = isCorrect ? pointsForHints(hintsUsed) : 0;
  score += pts;

  allBtns.forEach((b,i)=>{
    if(i === c.answer) b.classList.add('correct');
    else if(b === btnEl) b.classList.add('incorrect');
    else b.classList.add('dim');
  });

  feedbackEl.className = 'feedback show ' + (isCorrect ? 'good' : 'bad');
  feedbackEl.innerHTML = isCorrect
    ? `정답! <span class="pts">+${pts}점</span> (힌트 ${hintsUsed+1}개 사용)<div class="why">${c.why}</div>`
    : `아쉬워요. 정답은 <b>${c.name}</b>였어요. <span class="pts">+0점</span><div class="why">${c.why}</div>`;

  const slot = document.getElementById('slot-'+idx);
  slot.classList.add(isCorrect ? 'filled' : 'wrong');

  results.push({correct:isCorrect, code:c.code, continent:c.continent, name:c.name, locCorrect:false});

  scoreText.textContent = score;
  unlockMap();
  mapCaption.innerHTML = `지도에서 <b style="color:#E9C75B;">${c.name}</b>의 위치를 클릭하세요.`;
}

function onPinClick(clickedIdx){
  if(locAnswered) return;
  locAnswered = true;
  lockMap();

  const c = cities[idx];
  const correct = clickedIdx === idx;
  const pts = correct ? 5 : 0;
  score += pts;

  cityPins[idx].classList.add('revealed');

  if(!correct){
    const clickedPin = cityPins[clickedIdx];
    clickedPin.classList.add('wrong-flash');
    setTimeout(()=>{
      clickedPin.classList.remove('wrong-flash');
    }, 1400);
  }

  locFeedback.className = 'loc-feedback show ' + (correct ? 'good' : 'bad');
  locFeedback.innerHTML = correct
    ? `정확한 위치! <span style="font-family:'Space Mono',monospace;color:#E9C75B;font-weight:700;">+${pts}점</span><div style="margin-top:6px;color:#B9C4D6;">${c.name} — ${c.coord}</div>`
    : `아쉬워요, 다른 위치였어요. <span style="font-family:'Space Mono',monospace;color:#E9C75B;font-weight:700;">+0점</span><div style="margin-top:6px;color:#B9C4D6;">${c.name}은(는) 여기예요 — ${c.coord}</div>`;

  if(results.length){
    results[results.length-1].locCorrect = correct;
  }

  scoreText.textContent = score;
  nextBtn.className = 'next-btn show';
  nextBtn.textContent = (idx === cities.length-1) ? '결과 보기 →' : '다음 도시로 →';
}

nextBtn.addEventListener('click', ()=>{
  idx++;
  if(idx >= cities.length){
    showResult();
  } else {
    renderQuestion();
  }
});

function showResult(){
  quizCard.style.display = 'none';
  resultCard.className = 'result show';
  document.getElementById('finalScore').textContent = score;

  const byContinent = {};
  results.forEach(r=>{
    if(!byContinent[r.continent]) byContinent[r.continent] = {correct:0,total:0};
    byContinent[r.continent].total++;
    if(r.correct) byContinent[r.continent].correct++;
  });

  const summaryEl = document.getElementById('continentSummary');
  summaryEl.innerHTML = '';
  Object.keys(byContinent).forEach(cont=>{
    const row = document.createElement('div');
    row.className = 'csum-row';
    row.innerHTML = `<span>${cont}</span><b>${byContinent[cont].correct} / ${byContinent[cont].total}</b>`;
    summaryEl.appendChild(row);
  });
}

document.getElementById('restartBtn').addEventListener('click', ()=>{
  idx = 0; score = 0; results = [];
  quizCard.style.display = 'block';
  resultCard.className = 'result';
  initPassport();
  cityPins.forEach(p=>p.classList.remove('revealed','wrong-flash'));
  renderQuestion();
});

initPassport();
initMap();
renderQuestion();
</script>
</body>
</html>
